services:
  ctfd:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=${DATABASE_URL}
      # ping.py's readiness probe assumes a MySQL-style server where the target
      # database may not exist yet and nulls out the dbname to test connectivity.
      # On Postgres that makes libpq default to a dbname matching the user, which
      # doesn't exist on Supabase, so it retries forever. Supabase's database
      # already exists, so skip the probe and let `flask db upgrade` connect directly.
      - SKIP_DB_PING=true
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
      - .:/opt/CTFd:ro
    depends_on:
      permissions:
        condition: service_completed_successfully
      cache:
        condition: service_started
    networks:
        default:
        internal:

  # TODO: CTFd 4.0 Migrate to named volumes. Users will likely need to manually migrate existing files
  permissions:
    image: alpine:3.23
    user: root
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
    command: chown -R 1001:1001 /var/uploads /var/log/CTFd

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      - ctfd

  # Local MariaDB service removed: CTFd is configured to use an external
  # Supabase Postgres database via the DATABASE_URL env var (see .env.example).

  cache:
    image: redis:4
    restart: always
    volumes:
    - .data/redis:/data
    networks:
        internal:

networks:
    default:
    internal:
        internal: true
